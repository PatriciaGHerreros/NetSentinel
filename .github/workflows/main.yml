name: NetSentinel Daily Scan

on:
  schedule:
    # Esto hará que el escaneo se ejecute cada día a las 08:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Esto permite que tú lo ejecutes a mano cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargando el código del repositorio
      uses: actions/checkout@v3

    - name: Configurando Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalando librerías necesarias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutando el Escáner de Red
      env:
        # Aquí es donde conectamos los "Secrets" con el script
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python monitor.py